    <text x="1004" y="382" font-size="10" fill="#713F12" text-anchor="end">引用卡片</text>

    <rect x="402" y="466" width="36" height="20" rx="4" fill="#FACC15"/>
    <text x="420" y="481" font-size="11" font-weight="700" text-anchor="middle" fill="#713F12">④</text>

    <rect x="246" y="552" width="36" height="20" rx="4" fill="#FACC15"/>
    <text x="264" y="567" font-size="11" font-weight="700" text-anchor="middle" fill="#713F12">⑤</text>

    <rect x="246" y="744" width="36" height="20" rx="4" fill="#FACC15"/>
    <text x="264" y="759" font-size="11" font-weight="700" text-anchor="middle" fill="#713F12">⑥</text>
  </g>

  <!-- Footer caption -->
  <text x="640" y="60" font-size="0" fill="transparent">图1：对话主页（标准问答）</text>
</svg>
